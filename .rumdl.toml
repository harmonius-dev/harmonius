# rumdl configuration file

[global]
# Progress stubs are high-churn automation output; excluding avoids rumdl noise on in-flight rows.
exclude = [
  ".git",
  ".github",
  "**/CLAUDE.md",
  "**/templates/*.md",
  "build",
  "docs/plans/progress/**/*.md",
  "node_modules",
  "vendor",
]
flavor = "gfm"

[MD033]
allowed-elements = ["br"]

[MD013]
code-blocks = true
headings = true
line-length = 100
paragraphs = true
reflow = true
reflow-mode = "normalize"
strict = false
tables = false
