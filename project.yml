name: Harmonius

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.19.2

options:
  bundleIdPrefix: dev.harmonius
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: NO
    DEVELOPMENT_TEAM: ""

cmakeBuild: &cmake_build |
  set -euo pipefail
  export DEVELOPER_DIR="${DEVELOPER_DIR:-/Applications/Xcode.app/Contents/Developer}"
  case "$PLATFORM_NAME" in
    macosx)
      PLATFORM="macos"
      DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET}"
      ;;
    iphoneos)
      PLATFORM="ios"
      DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}"
      SWIFT_TARGET="arm64-apple-ios${IPHONEOS_DEPLOYMENT_TARGET}"
      ;;
    iphonesimulator)
      PLATFORM="ios-simulator"
      DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}"
      SWIFT_TARGET="arm64-apple-ios${IPHONEOS_DEPLOYMENT_TARGET}-simulator"
      ;;
    *) echo "error: Unknown platform $PLATFORM_NAME"; exit 1 ;;
  esac
  case "$CONFIGURATION" in
    Debug) CONFIG="debug" ;;
    Release) CONFIG="release" ;;
    *) CONFIG="debug" ;;
  esac
  PRESET="${PLATFORM}-${CONFIG}"
  EXTRA=(
    -DCMAKE_OSX_SYSROOT="$SDKROOT"
    -DCMAKE_OSX_ARCHITECTURES="$ARCHS"
    -DCMAKE_OSX_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET"
  )
  if [[ -n "${SWIFT_TARGET:-}" ]]; then
    EXTRA+=(-DCMAKE_Swift_COMPILER_TARGET="$SWIFT_TARGET")
  fi
  if [[ -n "${HARMONIUS_SLANGC:-}" ]]; then
    EXTRA+=(-DHARMONIUS_SLANGC="$HARMONIUS_SLANGC")
  fi
  cmake --preset "$PRESET" "${EXTRA[@]}"
  cmake --build --preset "$PRESET" --target ${HARMONIUS_CMAKE_TARGETS}

targets:
  HarmoniusApp:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: app/Resources/AppIcon.icon
        buildPhase: resources
      - path: app/Resources/Assets.xcassets
        buildPhase: resources
      - path: app/Resources/LaunchScreen.storyboard
        buildPhase: resources
        destinationFilters: [iOS]
      - path: .
        buildPhase: none
        excludes:
          - build/**
          - vcpkg/**
    dependencies:
      - sdk: AppKit.framework
        destinationFilters: [macOS]
      - sdk: UIKit.framework
        destinationFilters: [iOS]
      - sdk: SwiftUI.framework
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
    info:
      path: app/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    postBuildScripts:
      - name: Copy Prebuilt Binary
        script: |
          set -euo pipefail
          case "$PLATFORM_NAME" in
            macosx)
              PLATFORM="macos"
              SOURCE="${SRCROOT}/build/${PLATFORM}/app/HarmoniusApp"
              RESOURCES="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/Resources"
              ;;
            iphoneos)
              PLATFORM="ios"
              SOURCE="${SRCROOT}/build/${PLATFORM}/app/HarmoniusApp.app/HarmoniusApp"
              RESOURCES="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
              ;;
            iphonesimulator)
              PLATFORM="ios-simulator"
              SOURCE="${SRCROOT}/build/${PLATFORM}/app/HarmoniusApp.app/HarmoniusApp"
              RESOURCES="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
              ;;
            *) echo "error: Unknown platform $PLATFORM_NAME"; exit 1 ;;
          esac
          BINARY_DIR="${SRCROOT}/build/${PLATFORM}/app"
          DEST="${BUILT_PRODUCTS_DIR}/${EXECUTABLE_PATH}"
          mkdir -p "$(dirname "${DEST}")"
          cp "${SOURCE}" "${DEST}"
          mkdir -p "${RESOURCES}"
          cp "${BINARY_DIR}/metallibs/default.metallib" "${RESOURCES}/default.metallib"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
        CURRENT_PROJECT_VERSION: 1
        HARMONIUS_CMAKE_TARGETS: HarmoniusApp
        MARKETING_VERSION: 1.0
        PRODUCT_NAME: HarmoniusApp
        PRODUCT_BUNDLE_IDENTIFIER: dev.harmonius.App
        LINK_WITH_STANDARD_LIBRARIES: NO
        MACH_O_TYPE: mh_bundle
    scheme:
      testTargets:
        - HarmoniusUnitTests
        - HarmoniusUITests

  HarmoniusUnitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: app/HarmoniusRendering
        includes:
          - "**/*Tests.swift"
    dependencies:
      - target: HarmoniusApp
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    settings:
      base:
        HARMONIUS_CMAKE_TARGETS: HarmoniusRendering
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/HarmoniusApp.app/Contents/MacOS/HarmoniusApp
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/build/macos/app
        HEADER_SEARCH_PATHS: $(SRCROOT)/app/Shaders
        OTHER_SWIFT_FLAGS:
          - -cxx-interoperability-mode=default
          - -Xcc
          - -std=c++26
          - -Xcc
          - -I$(SRCROOT)/app/Shaders
        OTHER_LDFLAGS:
          - $(SRCROOT)/build/macos/app/libHarmoniusRendering.a

  HarmoniusUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: app/HarmoniusApp
        includes:
          - "**/*Tests.swift"
        excludes:
          - "**/__Snapshots__/**"
    dependencies:
      - target: HarmoniusApp
      - package: SnapshotTesting
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    settings:
      base:
        HARMONIUS_CMAKE_TARGETS: HarmoniusApp
        TEST_TARGET_NAME: HarmoniusApp
        GENERATE_INFOPLIST_FILE: YES
        OTHER_SWIFT_FLAGS: ""
