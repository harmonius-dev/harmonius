name: Harmonius

options:
  bundleIdPrefix: dev.harmonius
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: NO
    DEVELOPMENT_TEAM: ""

packages:
  HarmoniusPackage:
    path: .

targets:
  HarmoniusApp:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources/HarmoniusApp/Resources/AppIcon.icon
        buildPhase: resources
      - path: Sources/HarmoniusApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/HarmoniusApp/Resources/LaunchScreen.storyboard
        buildPhase: resources
        destinationFilters: [iOS]
      - path: Sources/HarmoniusApp/HarmoniusApp.swift
    dependencies:
      - package: HarmoniusPackage
        product: HarmoniusAppCore
      - sdk: AppKit.framework
        destinationFilters: [macOS]
      - sdk: UIKit.framework
        destinationFilters: [iOS]
      - sdk: SwiftUI.framework
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
    info:
      path: Sources/HarmoniusApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: Copyright (c) 2026 Harmonius contributors
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CLANG_CXX_LANGUAGE_STANDARD: c++2b
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: Sources/HarmoniusApp/HarmoniusApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX[sdk=macosx*]: YES
        MARKETING_VERSION: 1.0
        PRODUCT_NAME: HarmoniusApp
        PRODUCT_BUNDLE_IDENTIFIER: dev.harmonius.App
        SWIFT_OBJC_INTEROP_MODE: objcxx
