name: Harmonius

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.19.2

options:
  bundleIdPrefix: dev.harmonius
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

cmakeBuild: &cmake_build |
  set -euo pipefail
  export DEVELOPER_DIR="${DEVELOPER_DIR:-/Applications/Xcode.app/Contents/Developer}"
  case "$PLATFORM_NAME" in
    macosx) PLATFORM="macos" ;;
    iphoneos) PLATFORM="ios" ;;
    iphonesimulator) PLATFORM="ios-simulator" ;;
    *) echo "error: Unknown platform $PLATFORM_NAME"; exit 1 ;;
  esac
  case "$CONFIGURATION" in
    Debug) CONFIG="debug" ;;
    Release) CONFIG="release" ;;
    *) CONFIG="debug" ;;
  esac
  PRESET="${PLATFORM}-${CONFIG}"
  cmake --preset "$PRESET" \
    -DCMAKE_OSX_SYSROOT="$SDKROOT" \
    -DCMAKE_OSX_ARCHITECTURES="$ARCHS" \
    -DCMAKE_OSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET"
  cmake --build --preset "$PRESET" --target ${HARMONIUS_CMAKE_TARGETS}

targets:
  HarmoniusApp:
    type: application
    platform: macOS
    info:
      path: app/Info.plist
    sources:
      - path: app/Shaders
        buildPhase: none
      - path: app/HarmoniusApp
        buildPhase: none
      - path: app/HarmoniusRendering
        buildPhase: none
    dependencies:
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    postBuildScripts:
      - name: Copy Prebuilt Binary
        script: |
          set -euo pipefail
          case "$PLATFORM_NAME" in
            macosx) PLATFORM="macos" ;;
            iphoneos) PLATFORM="ios" ;;
            iphonesimulator) PLATFORM="ios-simulator" ;;
            *) echo "error: Unknown platform $PLATFORM_NAME"; exit 1 ;;
          esac
          BINARY_DIR="${SRCROOT}/build/${PLATFORM}/app"
          DEST="${BUILT_PRODUCTS_DIR}/${EXECUTABLE_PATH}"
          mkdir -p "$(dirname "${DEST}")"
          cp "${BINARY_DIR}/HarmoniusApp" "${DEST}"
          RESOURCES="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/Resources"
          mkdir -p "${RESOURCES}"
          cp "${BINARY_DIR}/metallibs/default.metallib" "${RESOURCES}/default.metallib"
    settings:
      base:
        HARMONIUS_CMAKE_TARGETS: HarmoniusApp
        PRODUCT_BUNDLE_IDENTIFIER: dev.harmonius.App
        LINK_WITH_STANDARD_LIBRARIES: NO
        MACH_O_TYPE: mh_bundle
    scheme:
      testTargets:
        - HarmoniusUnitTests
        - HarmoniusUITests

  HarmoniusUnitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: app/HarmoniusRendering
        includes:
          - "**/*Tests.swift"
    dependencies:
      - target: HarmoniusApp
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    settings:
      base:
        HARMONIUS_CMAKE_TARGETS: HarmoniusRendering
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/HarmoniusApp.app/Contents/MacOS/HarmoniusApp
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/build/macos/app
        HEADER_SEARCH_PATHS: $(SRCROOT)/app/Shaders
        OTHER_SWIFT_FLAGS:
          - -cxx-interoperability-mode=default
          - -Xcc
          - -std=c++26
          - -Xcc
          - -I$(SRCROOT)/app/Shaders
        OTHER_LDFLAGS:
          - $(SRCROOT)/build/macos/app/libHarmoniusRendering.a

  HarmoniusUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: app/HarmoniusApp
        includes:
          - "**/*Tests.swift"
        excludes:
          - "**/__Snapshots__/**"
    dependencies:
      - target: HarmoniusApp
      - package: SnapshotTesting
    preBuildScripts:
      - name: CMake Build
        basedOnDependencyAnalysis: false
        script: *cmake_build
    settings:
      base:
        HARMONIUS_CMAKE_TARGETS: HarmoniusApp
        TEST_TARGET_NAME: HarmoniusApp
        GENERATE_INFOPLIST_FILE: YES
        OTHER_SWIFT_FLAGS: ""
