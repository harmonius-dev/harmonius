name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REAL_SIGN: ${{ github.event_name != 'pull_request' }}
  UPLOAD_ASC: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  format:
    name: swift-format
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Swift Format
        run: brew install swift-format

      - name: Lint Swift sources
        run: swift-format lint --strict $(rg --files app -g '*.swift')

  test-macos:
    name: macos-tests
    runs-on: macos-26
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: build/macos/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit and UI tests
        run: |
          xcodebuild test \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp_macOS \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/xcodegen \
            -resultBundlePath build/xcodegen/test-results/HarmoniusApp.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: build/xcodegen/test-results/HarmoniusApp.xcresult
          if-no-files-found: warn

  deploy-ios:
    name: ios-release
    runs-on: macos-26-xlarge
    needs:
      - format
      - test-macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      IOS_PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            build/macos/vcpkg_installed
            build/ios/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Import distribution certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci-keychain "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-keychain "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        run: |
          PROFILE="$RUNNER_TEMP/Harmonius.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "HARMONIUS_PROVISIONING_PROFILE_FILE=$PROFILE" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set build number
        run: |
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT))
          echo "CURRENT_PROJECT_VERSION=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Archive iOS app
        run: |
          xcodebuild archive \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp_iOS \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/Harmonius.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$APPLE_DISTRIBUTION_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            MARKETING_VERSION=1.0

      - name: Export IPA
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/exportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dev.harmonius.App</key>
              <string>$IOS_PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/ios/Harmonius.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/ios/export
          shopt -s nullglob
          IPAS=(build/ios/export/*.ipa)
          if [[ ${#IPAS[@]} -ne 1 ]]; then
            echo "error: expected one IPA, found ${#IPAS[@]}"
            exit 1
          fi
          echo "IPA_PATH=${IPAS[0]}" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "$ASC_KEY_P8_B64" | base64 --decode > \
            "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          rm -f "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/export/*.ipa
          if-no-files-found: error

      - name: Delete build keychain
        if: always() && env.REAL_SIGN == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
