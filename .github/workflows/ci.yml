name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REAL_SIGN: ${{ github.event_name != 'pull_request' }}
  UPLOAD_ASC: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  format:
    name: swift-format
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install Swift Format
        run: brew install swift-format

      - name: Lint Swift sources
        run: git ls-files -z '*.swift' | xargs -0 swift-format lint --strict

  macos-unit-tests:
    name: macos-unit-tests
    runs-on: macos-26
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install imagemagick ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: build/macos/vcpkg_installed
          key: >-
            vcpkg-${{ runner.os }}-${{
            hashFiles('vcpkg.json', 'CMakePresets.json', 'project.yml')
            }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp \
            -only-testing:HarmoniusUnitTests \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/xcodegen \
            -clonedSourcePackagesDirPath build/spm \
            -resultBundlePath build/xcodegen/test-results/HarmoniusApp.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-unit-test-results
          path: build/xcodegen/test-results/HarmoniusApp.xcresult
          if-no-files-found: warn

  macos-ui-tests:
    name: macos-ui-tests
    runs-on: macos-26-xlarge
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install imagemagick ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: build/macos/vcpkg_installed
          key: >-
            vcpkg-${{ runner.os }}-${{
            hashFiles('vcpkg.json', 'CMakePresets.json', 'project.yml')
            }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp \
            -only-testing:HarmoniusUITests \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/xcodegen \
            -clonedSourcePackagesDirPath build/spm \
            -resultBundlePath build/xcodegen/test-results/HarmoniusUITests.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-ui-test-results
          path: build/xcodegen/test-results/HarmoniusUITests.xcresult
          if-no-files-found: warn

  deploy-ios:
    name: ios-release
    runs-on: macos-26
    needs:
      - format
      - macos-unit-tests
      - macos-ui-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      ASC_APPLE_ID: 6772846662
      HARMONIUS_SLANGC_DIR: ${{ github.workspace }}/build/macos/vcpkg_installed/arm64-osx
      IOS_PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install imagemagick ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            build/macos/vcpkg_installed
            build/ios/vcpkg_installed
          key: >-
            vcpkg-${{ runner.os }}-${{
            hashFiles('vcpkg.json', 'CMakePresets.json', 'project.yml')
            }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Import distribution certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci-keychain "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-keychain "$KEYCHAIN"
          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN" "${EXISTING_KEYCHAINS[@]}"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        run: |
          PROFILE="$RUNNER_TEMP/Harmonius.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "HARMONIUS_PROVISIONING_PROFILE_FILE=$PROFILE" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set build number
        run: |
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT))
          echo "CURRENT_PROJECT_VERSION=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "MARKETING_VERSION=1.0" >> "$GITHUB_ENV"

      - name: Archive iOS app
        run: |
          export HARMONIUS_SLANGC="$HARMONIUS_SLANGC_DIR/tools/shader-slang/slangc"
          xcodebuild archive \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/Harmonius.xcarchive \
            -clonedSourcePackagesDirPath build/spm \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$APPLE_DISTRIBUTION_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            MARKETING_VERSION="$MARKETING_VERSION"

      - name: Export IPA
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/exportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dev.harmonius.App</key>
              <string>$IOS_PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/ios/Harmonius.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/ios/export
          shopt -s nullglob
          IPAS=(build/ios/export/*.ipa)
          if [[ ${#IPAS[@]} -ne 1 ]]; then
            echo "error: expected one IPA, found ${#IPAS[@]}"
            exit 1
          fi
          echo "IPA_PATH=${IPAS[0]}" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "$ASC_KEY_P8_B64" | base64 --decode > \
            "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apple-id "$ASC_APPLE_ID" \
            --bundle-id "dev.harmonius.App" \
            --bundle-version "$CURRENT_PROJECT_VERSION" \
            --bundle-short-version-string "$MARKETING_VERSION" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          rm -f "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/export/*.ipa
          if-no-files-found: error

      - name: Delete build keychain
        if: always() && env.REAL_SIGN == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  deploy-macos:
    name: macos-release
    runs-on: macos-26
    needs:
      - format
      - macos-unit-tests
      - macos-ui-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
      APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_DISTRIBUTION_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_APPLE_ID: 6772846662
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      HARMONIUS_SLANGC_DIR: ${{ github.workspace }}/build/macos/vcpkg_installed/arm64-osx
      INSTALLER_P12_B64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
      INSTALLER_P12_PASS: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSPHRASE }}
      MACOS_PROVISIONING_PROFILE_B64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
      MACOS_PROVISIONING_PROFILE_NAME: ${{ secrets.MACOS_PROVISIONING_PROFILE_NAME }}
      P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
    steps:
      - name: Check macOS release secrets
        id: macos_release_config
        run: |
          REQUIRED=(
            APPLE_DISTRIBUTION_IDENTITY
            APPLE_INSTALLER_IDENTITY
            APPLE_TEAM_ID
            ASC_ISSUER_ID
            ASC_KEY_ID
            ASC_KEY_P8_B64
            INSTALLER_P12_B64
            INSTALLER_P12_PASS
            MACOS_PROVISIONING_PROFILE_B64
            MACOS_PROVISIONING_PROFILE_NAME
            P12_B64
            P12_PASS
          )
          MISSING=()
          for name in "${REQUIRED[@]}"; do
            if [[ -z "${!name}" ]]; then
              MISSING+=("$name")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            printf 'Missing macOS release secrets: %s\n' "${MISSING[*]}"
            echo "::notice title=macOS release skipped::Missing ${MISSING[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.macos_release_config.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        if: steps.macos_release_config.outputs.configured == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        if: steps.macos_release_config.outputs.configured == 'true'
        run: brew install imagemagick ninja xcodegen

      - name: Cache vcpkg installed tree
        if: steps.macos_release_config.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: build/macos/vcpkg_installed
          key: >-
            vcpkg-${{ runner.os }}-${{
            hashFiles('vcpkg.json', 'CMakePresets.json', 'project.yml')
            }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Import distribution certificates
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci-keychain "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-keychain "$KEYCHAIN"
          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN" "${EXISTING_KEYCHAINS[@]}"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          echo "$INSTALLER_P12_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          INSTALLER_P12_PASS="$(printf '%s' "$INSTALLER_P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" \
            -P "$INSTALLER_P12_PASS" -T /usr/bin/codesign \
            -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/installer.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          PROFILE="$RUNNER_TEMP/HarmoniusMac.provisionprofile"
          echo "$MACOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile

      - name: Install App Store Connect API key
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          KEY_PATH="$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_P8_B64" | base64 --decode > "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        if: steps.macos_release_config.outputs.configured == 'true'
        run: xcodegen generate

      - name: Set build number
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT))
          echo "CURRENT_PROJECT_VERSION=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "MARKETING_VERSION=1.0" >> "$GITHUB_ENV"

      - name: Archive macOS app
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          export HARMONIUS_SLANGC="$HARMONIUS_SLANGC_DIR/tools/shader-slang/slangc"
          xcodebuild archive \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp \
            -destination 'generic/platform=macOS' \
            -archivePath build/macos/Harmonius.xcarchive \
            -clonedSourcePackagesDirPath build/spm \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$APPLE_DISTRIBUTION_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$MACOS_PROVISIONING_PROFILE_NAME" \
            ARCHS=arm64 \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            MARKETING_VERSION="$MARKETING_VERSION"

      - name: Export macOS package
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          APP_PATH="build/macos/Harmonius.xcarchive/Products/Applications/HarmoniusApp.app"
          PKG_PATH="build/macos/export/HarmoniusApp.pkg"
          mkdir -p build/macos/export
          productbuild \
            --sign "$APPLE_INSTALLER_IDENTITY" \
            --component "$APP_PATH" \
            /Applications \
            "$PKG_PATH"
          productutil --check-signature "$PKG_PATH"
          echo "PKG_PATH=$PKG_PATH" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        if: steps.macos_release_config.outputs.configured == 'true'
        run: |
          xcrun altool --upload-package "$PKG_PATH" \
            --api-key "$ASC_KEY_ID" \
            --api-issuer "$ASC_ISSUER_ID" \
            --show-progress \
            --wait
          xcrun altool --build-status \
            --apple-id "$ASC_APPLE_ID" \
            --bundle-short-version-string "$MARKETING_VERSION" \
            --bundle-version "$CURRENT_PROJECT_VERSION" \
            --platform macos \
            --api-key "$ASC_KEY_ID" \
            --api-issuer "$ASC_ISSUER_ID" \
            --wait

      - name: Upload artifact
        if: steps.macos_release_config.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-pkg
          path: build/macos/export/*.pkg
          if-no-files-found: error

      - name: Delete build keychain
        if: always() && steps.macos_release_config.outputs.configured == 'true'
        run: |
          if [[ -n "${ASC_KEY_PATH:-}" ]]; then
            rm -f "$ASC_KEY_PATH"
          fi
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
