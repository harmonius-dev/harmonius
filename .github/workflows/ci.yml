name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REAL_SIGN: ${{ github.event_name != 'pull_request' }}
  UPLOAD_ASC: ${{ startsWith(github.ref, 'refs/tags/v') }}

# Require macOS 26 + Xcode 26 for Metal 4 and Swift 6.3.

jobs:
  test-macos:
    name: macos-tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4.1"

      - name: Install build tools
        run: brew install ninja xcodegen

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: build/macos/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit and UI tests
        run: |
          xcodebuild test \
            -project Harmonius.xcodeproj \
            -scheme HarmoniusApp \
            -destination "platform=macOS" \
            -derivedDataPath build/xcodegen \
            -resultBundlePath build/xcodegen/test-results/HarmoniusApp.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: build/xcodegen/test-results/HarmoniusApp.xcresult
          if-no-files-found: warn

  build:
    name: ${{ matrix.preset }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: macos-debug
            artifact: Harmonius.app
            artifact-path: build/macos/install/Harmonius.app
          - preset: macos-release
            artifact: Harmonius.app
            artifact-path: build/macos/install/Harmonius.app
          - preset: ios-debug
            artifact: Harmonius.ipa
            artifact-path: build/ios/Harmonius.ipa
          - preset: ios-release
            artifact: Harmonius.ipa
            artifact-path: build/ios/Harmonius.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4.1"

      - name: Install Ninja
        run: brew install ninja

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            build/macos/vcpkg_installed
            build/ios/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Import distribution certificate
        if: env.REAL_SIGN == 'true'
        env:
          P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
          KCPASS: ci-keychain
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KCPASS" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        if: env.REAL_SIGN == 'true' && startsWith(matrix.preset, 'ios')
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE="$RUNNER_TEMP/Harmonius.mobileprovision"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          security cms -D -i "$PROFILE" \
            | plutil -extract Entitlements xml1 -o \
              "$RUNNER_TEMP/entitlements.plist" -
          echo "HARMONIUS_PROVISIONING_PROFILE_FILE=$PROFILE" >> "$GITHUB_ENV"
          echo "HARMONIUS_ENTITLEMENTS_FILE=$RUNNER_TEMP/entitlements.plist" \
            >> "$GITHUB_ENV"

      - name: Configure
        env:
          APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
        run: |
          EXTRA=()
          if [[ "$REAL_SIGN" == "true" ]]; then
            EXTRA+=(-DHARMONIUS_CODESIGN_IDENTITY="$APPLE_DISTRIBUTION_IDENTITY")
            if [[ -n "${HARMONIUS_ENTITLEMENTS_FILE:-}" ]]; then
              EXTRA+=(-DHARMONIUS_CODESIGN_ENTITLEMENTS="$HARMONIUS_ENTITLEMENTS_FILE")
            fi
            if [[ -n "${HARMONIUS_PROVISIONING_PROFILE_FILE:-}" ]]; then
              EXTRA+=(-DHARMONIUS_PROVISIONING_PROFILE_FILE="$HARMONIUS_PROVISIONING_PROFILE_FILE")
            fi
          fi
          cmake --preset ${{ matrix.preset }} "${EXTRA[@]}"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Install
        if: startsWith(matrix.preset, 'macos')
        run: cmake --install build/macos

      - name: Verify macOS bundle signature
        if: env.REAL_SIGN == 'true' && startsWith(matrix.preset, 'macos')
        run: |
          codesign -dvv build/macos/install/Harmonius.app 2>&1 | tee /tmp/codesign.out
          grep -q "Authority=Apple Distribution" /tmp/codesign.out

      - name: Verify macOS bundle signature (ad-hoc)
        if: env.REAL_SIGN != 'true' && startsWith(matrix.preset, 'macos')
        run: codesign -dv build/macos/install/Harmonius.app

      - name: Upload to App Store Connect
        if: env.UPLOAD_ASC == 'true' && matrix.preset == 'ios-release'
        env:
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          KEY_P8_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "$KEY_P8_B64" | base64 --decode > "$KEYDIR/AuthKey_${KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/Harmonius.ipa \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"
          rm -f "$KEYDIR/AuthKey_${KEY_ID}.p8"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}-${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Delete build keychain
        if: always() && env.REAL_SIGN == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
