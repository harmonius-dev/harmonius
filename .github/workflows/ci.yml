name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REAL_SIGN: ${{ github.event_name != 'pull_request' }}

jobs:
  quality:
    name: quality
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5.0"

      - name: Install tools
        run: brew install jq swift-format xcodegen

      - name: Run guardrails
        run: |
          ./scripts/dev.sh package-graph
          ./scripts/dev.sh full-check

  apple-tests:
    name: apple-tests
    runs-on: macos-26-xlarge
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5.0"

      - name: Install tools
        run: brew install jq swift-format xcodegen

      - name: Cache vcpkg installed trees
        uses: actions/cache@v4
        with:
          key: >-
            vcpkg-${{ runner.os }}-${{
            hashFiles('Package.swift', 'vcpkg.json', 'scripts/dev.sh')
            }}
          path: |
            build/ios-simulator/vcpkg_installed
            build/macos/vcpkg_installed
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Build macOS bundle
        run: ./scripts/dev.sh bundle macos debug

      - name: Run SwiftPM tests
        run: |
          ./scripts/dev.sh test-unit
          ./scripts/dev.sh test-render

      - name: Run Appium macOS UI tests
        run: ./scripts/dev.sh test-ui-macos

      - name: Run Appium iOS simulator UI tests
        run: ./scripts/dev.sh test-ui-ios-simulator

  deploy-ios:
    name: ios-release
    runs-on: macos-26
    needs:
      - apple-tests
      - quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_APPLE_ID: 6772846662
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      IOS_PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5.0"

      - name: Install tools
        run: brew install jq swift-format xcodegen

      - name: Run release validation
        run: ./scripts/dev.sh release-validate

      - name: Import distribution certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci-keychain "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-keychain "$KEYCHAIN"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain "$KEYCHAIN"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        run: |
          PROFILE="$RUNNER_TEMP/Harmonius.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Archive iOS app
        run: ./scripts/dev.sh archive ios

      - name: Export IPA
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/exportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/ios/Harmonius.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath build/ios/export

      - name: Upload to App Store Connect
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > \
            "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/export/*.ipa \
            --apple-id "$ASC_APPLE_ID" \
            --bundle-id "dev.harmonius.App" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ios-release-ipa
          path: build/ios/export/*.ipa

      - name: Delete build keychain
        if: always() && env.REAL_SIGN == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  deploy-macos:
    name: macos-release
    runs-on: macos-26
    needs:
      - apple-tests
      - quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APPLE_DISTRIBUTION_IDENTITY: ${{ secrets.APPLE_DISTRIBUTION_IDENTITY }}
      APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_DISTRIBUTION_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      MACOS_PROVISIONING_PROFILE_B64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
      MACOS_PROVISIONING_PROFILE_NAME: ${{ secrets.MACOS_PROVISIONING_PROFILE_NAME }}
      P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5.0"

      - name: Install tools
        run: brew install jq swift-format xcodegen

      - name: Run release validation
        run: ./scripts/dev.sh release-validate

      - name: Import distribution certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p ci-keychain "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci-keychain "$KEYCHAIN"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          P12_PASS="$(printf '%s' "$P12_PASS" | tr -d '\n')"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain "$KEYCHAIN"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        run: |
          PROFILE="$RUNNER_TEMP/HarmoniusMac.provisionprofile"
          echo "$MACOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          cp "$PROFILE" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile

      - name: Archive macOS app
        run: ./scripts/dev.sh archive macos

      - name: Export macOS package
        run: |
          APP_PATH="build/macos/Harmonius.xcarchive/Products/Applications/HarmoniusApp.app"
          PKG_PATH="build/macos/export/HarmoniusApp.pkg"
          mkdir -p build/macos/export
          productbuild \
            --sign "$APPLE_INSTALLER_IDENTITY" \
            --component "$APP_PATH" \
            /Applications \
            "$PKG_PATH"
          pkgutil --check-signature "$PKG_PATH"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: macos-release-pkg
          path: build/macos/export/*.pkg

      - name: Delete build keychain
        if: always() && env.REAL_SIGN == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
