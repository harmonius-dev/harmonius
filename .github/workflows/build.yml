name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos-metal:
    name: macOS (Metal)
    runs-on: macos-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and Ninja
        run: brew install llvm ninja

      - name: Install CMake 4
        run: pip install "cmake~=4.0" cmake-format --break-system-packages

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: cmake --preset macos-release

      - name: Build
        run: cmake --build --preset macos-release

  linux-vulkan:
    name: Linux (Vulkan)
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y \
            "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update
          sudo apt-get install -y \
            clang-21 libc++-21-dev libc++abi-21-dev lld-21 ninja-build

      - name: Install Vulkan SDK
        run: |
          wget -qO /tmp/lunarg-signing-key-pub.asc \
            https://packages.lunarg.com/lunarg-signing-key-pub.asc
          cat /tmp/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install CMake 4
        run: pip install "cmake~=4.0" cmake-format --break-system-packages

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Find libc++ modules JSON
        id: find-modules
        run: |
          MODULES_JSON=$(find /usr/lib/llvm-21 -name 'libc++.modules.json' 2>/dev/null | head -1)
          if [ -z "$MODULES_JSON" ]; then
            echo "ERROR: libc++.modules.json not found under /usr/lib/llvm-21"
            find /usr/lib/llvm-21 -name '*.modules.json' 2>/dev/null || true
            dpkg -L libc++-21-dev | grep -i module || true
            exit 1
          fi
          echo "Found: $MODULES_JSON"
          echo "path=$MODULES_JSON" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake --preset linux-release \
            -DCMAKE_C_COMPILER=clang-21 \
            -DCMAKE_CXX_COMPILER=clang++-21 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON=${{ steps.find-modules.outputs.path }}

      - name: Build
        run: cmake --build --preset linux-release

  windows-d3d12:
    name: Windows (D3D12)
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake 4 and Ninja
        run: pip install "cmake~=4.0" cmake-format ninja

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: cmake --preset windows-release-d3d12

      - name: Build
        run: cmake --build --preset windows-release-d3d12

  windows-vulkan:
    name: Windows (Vulkan)
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake 4 and Ninja
        run: pip install "cmake~=4.0" cmake-format ninja

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: cmake --preset windows-release-vulkan

      - name: Build
        run: cmake --build --preset windows-release-vulkan
