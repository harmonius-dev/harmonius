name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-
            ${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check workspace members
        id: members
        run: |
          N=$(cargo metadata --no-deps \
            --format-version 1 \
            | jq '.packages | length')
          echo "count=$N" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.members.outputs.count > 0
        run: cargo build

      - name: Test
        if: steps.members.outputs.count > 0
        run: cargo test
