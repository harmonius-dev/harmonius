name: Linux Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/linux-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/linux-tests.yml"

jobs:
  test-linux:
    name: Linux (Vulkan backend build + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools

      - name: Configure (Ninja)
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vendor/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_INSTALL_OPTIONS=--allow-unsupported

      - name: Build and run Vulkan tests
        run: |
          cmake --build build
          ctest --test-dir build -R test-vulkan --output-on-failure
