name: Linux Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/linux-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/linux-tests.yml"

jobs:
  test-linux:
    name: Linux (Vulkan backend build + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools ninja cmake

      - name: Configure and build Vulkan tests
        run: |
          cmake --preset ninja-debug && cmake --build --preset ninja-debug

      - name: Run Vulkan tests
        run: ctest --test-dir build/debug -R test-vulkan --output-on-failure
