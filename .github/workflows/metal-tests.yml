name: Metal Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "src/platform/metal/**"
      - "src/platform/include/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/metal-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/platform/metal/**"
      - "src/platform/include/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/metal-tests.yml"

jobs:
  test-metal:
    name: Metal Integration Tests
    runs-on: macos-26-xlarge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure (Ninja)
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build and run Metal tests
        run: |
          cmake --build build
          ctest --test-dir build -R test-metal --output-on-failure
