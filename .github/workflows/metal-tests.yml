name: Metal Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/platform/metal/**'
      - 'src/platform/include/**'
      - 'tests/test_metal_integration.m'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/metal-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/platform/metal/**'
      - 'src/platform/include/**'
      - 'tests/test_metal_integration.m'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/metal-tests.yml'

jobs:
  test-metal:
    name: Metal Integration Tests
    runs-on: macos-26-xlarge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-aarch64-macos-0.15.2" >> $GITHUB_PATH

      - name: Build and run Metal tests
        run: zig build test-metal

      - name: Build library
        run: zig build
