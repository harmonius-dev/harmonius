name: macOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: macOS (Vulkan backend with KosmicKrisp)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LunarG Vulkan SDK
        run: |
          # Download and install LunarG Vulkan SDK 1.4.341.0
          curl -L -o vulkan-sdk.zip https://sdk.lunarg.com/sdk/download/1.4.341.0/mac/vulkansdk-macos-1.4.341.0.zip
          unzip vulkan-sdk.zip
          sudo open -a $PWD/vulkansdk-macOS-1.4.341.0.app --args \
            --root ~/VulkanSDK/1.4.341.0 \
            --accept-licenses \
            --default-answer \
            --confirm-command install
          rm vulkansdk-macOS-1.4.341.0.app vulkansdk-macOS-1.4.341.0.zip

          # Set up environment
          VULKAN_SDK=$HOME/VulkanSDK/1.4.341.0/macOS
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/libkosmickrisp_icd.json" >> $GITHUB_ENV
          echo "VK_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d" >> $GITHUB_ENV
          echo "$VULKAN_SDK/bin" >> $GITHUB_PATH

      - name: Install Ninja and LLVM 20
        run: brew install ninja cmake llvm@20 && brew link llvm@20

      - name: Configure and build
        run: |
          cmake --preset ninja-debug && cmake --build --preset ninja-debug
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
          VK_ICD_FILENAMES: ${{ env.VK_ICD_FILENAMES }}
          VK_LAYER_PATH: ${{ env.VK_LAYER_PATH }}

      - name: Run tests
        run: |
          ctest --test-dir build/debug -R test-vulkan --output-on-failure
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
          VK_ICD_FILENAMES: ${{ env.VK_ICD_FILENAMES }}
          VK_LAYER_PATH: ${{ env.VK_LAYER_PATH }}
