name: D3D12 Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/d3d12-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/d3d12-tests.yml"

jobs:
  test-d3d12:
    name: D3D12 Integration Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install D3D12 dependencies
        run: .\scripts\fetch-d3d12-deps.ps1

      - name: Configure (Ninja)
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build and run D3D12 tests
        run: |
          cmake --build build
          ctest --test-dir build -R test-d3d12 --output-on-failure
