name: D3D12 Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/d3d12-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/d3d12-tests.yml"

jobs:
  test-d3d12:
    name: D3D12 Integration Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install D3D12 dependencies
        run: |
          nuget install Microsoft.Direct3D.DXC -OutputDirectory packages
          nuget install Microsoft.Direct3D.DirectStorage -OutputDirectory packages
          
          # Find NuGet package paths
          $dxcPath = (Get-ChildItem -Path packages -Filter "Microsoft.Direct3D.DXC*" -Directory | Select-Object -First 1).FullName
          $dstoragePath = (Get-ChildItem -Path packages -Filter "Microsoft.Direct3D.DirectStorage*" -Directory | Select-Object -First 1).FullName
          
          # Find Windows SDK path (for d3dcompiler.lib, d3d12.lib, etc.)
          $sdkDir = "C:\Program Files (x86)\Windows Kits\10\Lib"
          $sdkVersion = (Get-ChildItem -Path $sdkDir -Directory | Where-Object { $_.Name -match '^\d+\.' } | Sort-Object Name -Descending | Select-Object -First 1).Name
          $winsdkLibPath = "$sdkDir\$sdkVersion\um\x64"
          
          # Export paths for zig build
          echo "DXC_LIB_PATH=$dxcPath\build\native\lib\x64" >> $env:GITHUB_ENV
          echo "DXC_INCLUDE_PATH=$dxcPath\build\native\include" >> $env:GITHUB_ENV
          echo "DSTORAGE_LIB_PATH=$dstoragePath\native\lib\x64" >> $env:GITHUB_ENV
          echo "DSTORAGE_INCLUDE_PATH=$dstoragePath\native\include" >> $env:GITHUB_ENV
          echo "WINSDK_LIB_PATH=$winsdkLibPath" >> $env:GITHUB_ENV

      - name: Setup Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip -o zig.zip
          Expand-Archive zig.zip -DestinationPath .
          echo "$PWD\zig-x86_64-windows-0.15.2" >> $env:GITHUB_PATH

      - name: Build and run D3D12 tests
        run: |
          zig build test-d3d12 `
            -Dwinsdk-lib-path="${{ env.WINSDK_LIB_PATH }}" `
            -Ddxc-lib-path="${{ env.DXC_LIB_PATH }}" `
            -Ddxc-include-path="${{ env.DXC_INCLUDE_PATH }}" `
            -Ddstorage-lib-path="${{ env.DSTORAGE_LIB_PATH }}" `
            -Ddstorage-include-path="${{ env.DSTORAGE_INCLUDE_PATH }}"
