name: D3D12 Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/platform/d3d12/**'
      - 'src/platform/include/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/d3d12-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/platform/d3d12/**'
      - 'src/platform/include/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/d3d12-tests.yml'

jobs:
  test-d3d12:
    name: D3D12 Integration Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.1

      - name: Build and run D3D12 tests
        run: zig build test-d3d12

      - name: Build library
        run: zig build
