name: D3D12 Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/d3d12-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/platform/d3d12/**"
      - "src/platform/include/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/d3d12-tests.yml"

jobs:
  test-d3d12:
    name: D3D12 Integration Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install D3D12 dependencies
        run: |
          nuget install Microsoft.Direct3D.DXC -OutputDirectory packages
          nuget install Microsoft.Direct3D.DirectStorage -OutputDirectory packages
          
          # Debug: Show package contents
          $dxcPath = (Get-ChildItem -Path packages -Filter "Microsoft.Direct3D.DXC*" -Directory | Select-Object -First 1).FullName
          $dstoragePath = (Get-ChildItem -Path packages -Filter "Microsoft.Direct3D.DirectStorage*" -Directory | Select-Object -First 1).FullName
          Write-Host "DXC Package contents:"
          Get-ChildItem -Path $dxcPath -Recurse | ForEach-Object { Write-Host $_.FullName }
          Write-Host "DirectStorage Package contents:"
          Get-ChildItem -Path $dstoragePath -Recurse | ForEach-Object { Write-Host $_.FullName }
          
          # Find actual lib paths - DXC has libs in build/native/lib/x64
          $dxcLibPath = "$dxcPath\build\native\lib\x64"
          if (!(Test-Path $dxcLibPath)) {
            $dxcLibPath = "$dxcPath\lib\native\x64"
          }
          if (!(Test-Path $dxcLibPath)) {
            # Fallback to bin path for DLLs
            $dxcLibPath = "$dxcPath\bin\x64"
          }
          
          echo "DXC_LIB_PATH=$dxcLibPath" >> $env:GITHUB_ENV
          echo "DSTORAGE_LIB_PATH=$dstoragePath\native\lib\x64" >> $env:GITHUB_ENV
          Write-Host "DXC_LIB_PATH=$dxcLibPath"
          Write-Host "DSTORAGE_LIB_PATH=$dstoragePath\native\lib\x64"

      - name: Setup Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip -o zig.zip
          Expand-Archive zig.zip -DestinationPath .
          echo "$PWD\zig-x86_64-windows-0.15.2" >> $env:GITHUB_PATH

      - name: Build and run D3D12 tests
        run: zig build test-d3d12 -Ddxc-lib-path="${{ env.DXC_LIB_PATH }}" -Ddstorage-lib-path="${{ env.DSTORAGE_LIB_PATH }}"
