name: Markdown

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".rumdl.toml"
      - ".github/workflows/markdown.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".rumdl.toml"
      - ".github/workflows/markdown.yml"

permissions:
  contents: write

jobs:
  rumdl:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install rumdl
        run: |
          gh release download --repo rvben/rumdl \
            --pattern 'rumdl-*-x86_64-unknown-linux-gnu.tar.gz' \
            --dir /tmp/rumdl
          tar -xzf /tmp/rumdl/rumdl-*-x86_64-unknown-linux-gnu.tar.gz \
            -C /tmp/rumdl
          install /tmp/rumdl/rumdl /usr/local/bin/rumdl
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check Markdown
        id: check
        run: rumdl check .
        continue-on-error: true

      - name: Fix Markdown violations
        if: steps.check.outcome == 'failure'
        run: |
          rumdl fmt .
          if git diff --quiet; then
            echo "rumdl fmt produced no changes but check failed."
            echo "Manual fixes required."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "*.md"
          git commit -m "fix: auto-fix Markdown violations via rumdl"
          git push
