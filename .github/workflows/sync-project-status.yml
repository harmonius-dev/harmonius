name: Sync project Status from issue labels

# Triggers on every label change and on issue open/reopen so the project field
# stays in sync regardless of which event first attaches a status:* label.
on:
  issues:
    types: [labeled, unlabeled, opened, reopened]

# Only what the failure-report step needs from GITHUB_TOKEN. The Projects v2
# mutations run under a separate GitHub App installation token (minted below
# via actions/create-github-app-token), which carries its own
# Organization:Projects:write permission and is unaffected by this block.
permissions:
  contents: read
  issues: write

jobs:
  sync:
    # Skip non-BL issues entirely; no GraphQL calls are made.
    if: startsWith(github.event.issue.title, 'BL-')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Mint a short-lived installation token for the harmonius-project-sync
      # GitHub App. App ID + private key live in repo secrets; token expires
      # in ~1 hour. App must have Organization:Projects:Read and write granted
      # and be installed on the harmonius-dev org.
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HARMONIUS_PROJECT_APP_ID }}
          private-key: ${{ secrets.HARMONIUS_PROJECT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Sync Status field
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Hard-coded IDs for Engine Roadmap project #1 (harmonius-dev org).
          # If the project is re-created, update these values here and in the
          # OPTION_ID table inside sync-project-status.sh. The correct IDs are
          # printed at the end of seed-project.sh output, or can be re-queried
          # via the GraphQL `organization(login).projectV2(number)` field.
          PROJECT_ID: PVT_kwDOERwpE84BYhjf
          STATUS_FIELD_ID: PVTSSF_lADOERwpE84BYhjfzhTm1SY
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: bash .github/workflows/sync-project-status.sh

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/$REPO"
          RUN_URL="$RUN_URL/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo "$REPO" \
            --title "sync-project-status failed on issue #$ISSUE_NUM" \
            --body "Workflow run: $RUN_URL" \
            --label "status:blocked" \
            --label "domain:meta"
