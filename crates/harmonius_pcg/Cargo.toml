[package]
authors = ["Harmonius Contributors"]
description = "Procedural generation primitives and acceptance tests for Harmonius PCG design."
edition = "2021"
license = "MIT OR Apache-2.0"
name = "harmonius_pcg"
repository = "https://github.com/cjhowe-us/harmonius"
rust-version = "1.85"
version = "0.1.0"

[dependencies]
glam = { version = "0.29", default-features = false, features = ["std"] }
noise = "0.9"
rayon = "1.10"
twox-hash = "2.0"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
