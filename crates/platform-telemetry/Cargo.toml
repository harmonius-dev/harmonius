[package]
authors = ["Harmonius Contributors"]
description = "Platform telemetry client: consent, buffering, batching, and schema catalog"
edition = "2021"
license = "MIT OR Apache-2.0"
name = "platform-telemetry"
readme = "README.md"
repository = "https://github.com/cjhowe-us/harmonius"
version = "0.1.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tempfile = "3.10"
trybuild = "1.0"
