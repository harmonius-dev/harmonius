[package]
edition = "2024"
name = "plugin_marketplace"
version = "0.1.0"

[dependencies]
blake3 = "1.5"
ed25519-dalek = { version = "2.1", default-features = false, features = ["std"] }
rkyv = { version = "0.8.15", features = ["bytecheck", "std"] }
rkyv_derive = "0.8.15"
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
rand = "0.8"
tempfile = "3.14"
