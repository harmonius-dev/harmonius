[package]
description = "Binary, text, migration, and binary-companion serialization for Harmonius."
edition = "2021"
name = "harmonius_serialize"
version = "0.1.0"

[dependencies]
blake3 = "1.5"
lz4_flex = { version = "0.11", default-features = false, features = ["std"] }
rkyv = { version = "0.8.15", default-features = false, features = ["alloc", "bytecheck", "std"] }
rkyv_derive = "0.8.15"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
