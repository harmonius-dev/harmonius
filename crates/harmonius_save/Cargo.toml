[package]
name = "harmonius_save"
version = "0.1.0"
edition = "2021"
description = "Save system primitives for Harmonius (serialization, migration, slots, pipeline)"
license = "Apache-2.0"
publish = false

[dependencies]
aes-gcm = "0.10"
crc32fast = "1.4"
lz4_flex = { version = "0.11", default-features = false, features = ["frame"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
smallvec = { version = "1.13", features = ["serde"] }
zstd = "0.13"

[dev-dependencies]
tempfile = "3.10"
