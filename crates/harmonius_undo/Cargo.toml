[package]
license = "Apache-2.0"
edition = "2021"
name = "harmonius_undo"
version = "0.0.0"

[lib]
path = "src/lib.rs"

[dependencies]
rkyv = { version = "0.8.15", default-features = true, features = ["std"] }
smallvec = { version = "1.15", features = ["const_generics"] }
thiserror = "2.0"
tokio = { version = "1.44", features = ["fs", "io-util", "macros", "rt", "sync"] }

[dev-dependencies]
tempfile = "3.19"
