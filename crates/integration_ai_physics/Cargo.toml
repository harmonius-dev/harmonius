[package]
authors = ["Harmonius Contributors"]
description = "AI ↔ physics integration contracts and deterministic CPU test harness"
edition = "2021"
license = "MIT OR Apache-2.0"
name = "integration_ai_physics"
readme = "README.md"
repository = "https://github.com/cjhowe-us/harmonius"
rust-version = "1.85"
version = "0.1.0"

[dependencies]
glam = { version = "0.29", default-features = false, features = ["std"] }
smallvec = { version = "1.13", default-features = false, features = ["const_generics"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
harness = false
name = "ai_physics"
