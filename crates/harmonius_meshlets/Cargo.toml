[package]
license = "Apache-2.0"
edition = "2021"
name = "harmonius_meshlets"
rust-version = "1.85"
version = "0.1.0"

[dependencies]
bytemuck = { version = "1.16", features = ["derive"] }
glam = { version = "0.29", default-features = false, features = ["bytemuck", "libm"] }
meshopt = "0.6.2"
rkyv = { version = "0.8", default-features = false, features = ["alloc", "bytecheck", "std"] }
rkyv_derive = "0.8"
sha2 = "0.10"
