[package]
license = "Apache-2.0"
edition = "2021"
name = "harmonius_primitives"
rust-version = "1.85"
version = "0.1.0"

[dependencies]
fixedbitset = { version = "0.5", default-features = false }
glam = { version = "0.29", default-features = false, features = ["libm"] }
rkyv = { version = "0.8", default-features = false, features = ["alloc", "bytecheck", "pointer_width_64"] }
rkyv_derive = "0.8"
smallvec = { version = "1.15", default-features = false }

[dev-dependencies]
trybuild = "1.0"
