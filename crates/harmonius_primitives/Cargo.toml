[package]
edition = "2021"
name = "harmonius_primitives"
rust-version = "1.85"
version = "0.1.0"

[dependencies]
fixedbitset = "0.5"
glam = { version = "0.29", default-features = false, features = ["libm"] }
rkyv = { version = "0.8", default-features = false, features = ["alloc", "bytecheck", "pointer_width_64", "std"] }
rkyv_derive = "0.8"
smallvec = "1.15"

[dev-dependencies]
trybuild = "1.0"
